name: Auto-rebase open PRs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-rebase
  cancel-in-progress: false

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rebase open PRs onto master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          git fetch origin master
          master_sha=$(git rev-parse origin/master)

          prs=$(gh pr list --repo "$REPO" --state open --base master \
            --json number,headRefName,headRepositoryOwner,headRepository,isCrossRepository \
            --jq '.[] | select(.isCrossRepository == false) | "\(.number) \(.headRefName)"')

          if [ -z "$prs" ]; then
            echo "No open same-repo PRs targeting master."
            exit 0
          fi

          echo "$prs" | while read -r pr_number branch; do
            [ -z "$pr_number" ] && continue
            echo "::group::PR #$pr_number ($branch)"

            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"

            base=$(git merge-base HEAD "$master_sha")
            if [ "$base" = "$master_sha" ]; then
              echo "Already up to date with master, skipping."
              echo "::endgroup::"
              continue
            fi

            if git rebase "$master_sha"; then
              if git push --force-with-lease origin "$branch"; then
                echo "Rebased and pushed."
              else
                echo "Push failed (branch likely moved). Skipping."
                git rebase --abort 2>/dev/null || true
              fi
            else
              echo "Rebase conflict on PR #$pr_number; aborting."
              git rebase --abort || true
              gh pr comment "$pr_number" --repo "$REPO" --body \
                "Auto-rebase onto \`master\` hit a conflict. Please rebase manually." \
                || true
            fi

            git rebase --abort 2>/dev/null || true
            git checkout --detach "$master_sha"
            echo "::endgroup::"
          done
