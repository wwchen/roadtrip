name: Auto-rebase open PRs

on:
  push:
    branches: [master]
  pull_request_target:
    types: [edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to rebase (blank = all conflicting)"
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-rebase-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.pr_number || 'master' }}
  cancel-in-progress: false

jobs:
  rebase:
    # Run on master push, PR retarget-to-master, /rebase PR comment, or manual dispatch.
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.base.ref == 'master' &&
       github.event.changes.base.ref.from != null &&
       github.event.pull_request.head.repo.full_name == github.repository) ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.comment.user.login == github.repository_owner &&
       github.event.comment.body == '/rebase')
    runs-on: ubuntu-latest
    steps:
      # Use a GitHub App token (same one self-approve.yml uses) so force-pushes
      # to PR branches re-trigger ci.yml. Pushes from the default GITHUB_TOKEN
      # are intentionally suppressed by GitHub and do not fire workflows.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.SELF_APPROVE_APPID }}
          private-key: ${{ secrets.SELF_APPROVE_PRIVATEKEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pick target PRs
        id: pick
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          COMMENT_PR: ${{ github.event.issue.number }}
          DISPATCH_PR: ${{ github.event.inputs.pr_number }}
          RETARGET_PR: ${{ github.event.pull_request.number }}
          RETARGET_HEAD: ${{ github.event.pull_request.head.ref }}
          RETARGET_BASE: ${{ github.event.pull_request.base.ref }}
          RETARGET_OLD_BASE: ${{ github.event.changes.base.ref.from }}
          RETARGET_IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          set -euo pipefail

          if [ "$EVENT" = "pull_request_target" ]; then
            # GitHub retargeted a stacked PR from its parent branch to master.
            # Keep the old base so the rebase step can transplant only the
            # current PR's commits: rebase --onto origin/master old-base head.
            if [ "$RETARGET_IS_FORK" = "false" ] && \
               [ "$RETARGET_BASE" = "master" ] && \
               [ -n "$RETARGET_OLD_BASE" ]; then
              printf '%s %s %s\n' "$RETARGET_PR" "$RETARGET_HEAD" "$RETARGET_OLD_BASE" > prs.txt
            else
              : > prs.txt
            fi
          elif [ "$EVENT" = "issue_comment" ]; then
            # Single PR from /rebase comment.
            gh pr view "$COMMENT_PR" --repo "$REPO" \
              --json number,headRefName,isCrossRepository,baseRefName \
              --jq 'select(.isCrossRepository == false and .baseRefName == "master") | "\(.number) \(.headRefName)"' \
              > prs.txt
          elif [ "$EVENT" = "workflow_dispatch" ] && [ -n "$DISPATCH_PR" ]; then
            gh pr view "$DISPATCH_PR" --repo "$REPO" \
              --json number,headRefName,isCrossRepository,baseRefName \
              --jq 'select(.isCrossRepository == false and .baseRefName == "master") | "\(.number) \(.headRefName)"' \
              > prs.txt
          else
            # Push to master or manual dispatch w/o PR: only PRs whose merge
            # is currently CONFLICTING (typical for stacked PRs after the
            # bottom PR merges and GitHub retargets the next one to master).
            gh pr list --repo "$REPO" --state open --base master \
              --json number,headRefName,isCrossRepository,mergeable \
              --jq '.[] | select(.isCrossRepository == false and .mergeable == "CONFLICTING") | "\(.number) \(.headRefName)"' \
              > prs.txt
          fi

          if [ ! -s prs.txt ]; then
            echo "No matching PRs."
          else
            cat prs.txt
          fi

      - name: Rebase
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          [ -s prs.txt ] || exit 0

          git fetch origin +refs/heads/master:refs/remotes/origin/master
          master_sha=$(git rev-parse origin/master)

          while read -r pr_number branch old_base; do
            [ -z "$pr_number" ] && continue
            echo "::group::PR #$pr_number ($branch)"

            git fetch origin "+refs/heads/$branch:refs/remotes/origin/$branch"
            git checkout -B "$branch" "origin/$branch"

            if [ -n "${old_base:-}" ]; then
              git fetch origin "+refs/heads/$old_base:refs/remotes/origin/$old_base"
              echo "Rebasing $branch onto origin/master from old base $old_base."
              rebase_args=(--onto origin/master "origin/$old_base" "$branch")
            else
              base=$(git merge-base HEAD "$master_sha")
              if [ "$base" = "$master_sha" ]; then
                echo "Already up to date with master."
                git checkout --detach "$master_sha"
                echo "::endgroup::"
                continue
              fi

              # `git rebase master` drops patches already in master by patch-id,
              # which is what un-sticks stacked PRs after their parent merges.
              rebase_args=("$master_sha")
            fi

            if git rebase "${rebase_args[@]}"; then
              if git push --force-with-lease origin "$branch"; then
                echo "Rebased and pushed."
              else
                echo "Push rejected (branch moved). Skipping."
              fi
            else
              echo "Rebase conflict on PR #$pr_number; aborting."
              git rebase --abort || true
              gh pr comment "$pr_number" --repo "$REPO" --body \
                "Auto-rebase onto \`master\` hit a conflict. Please rebase manually." \
                || true
            fi

            git rebase --abort 2>/dev/null || true
            git checkout --detach "$master_sha"
            echo "::endgroup::"
          done < prs.txt
