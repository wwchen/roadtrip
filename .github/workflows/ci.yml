name: CI

# Build-only. No auto-deploy — `make deploy` from a laptop is the production
# path (mini-ca runs the prod container).
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same PR/branch to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - name: ktlint
        run: ./gradlew ktlintCheck -x generateJooq
        working-directory: backend

  backend-tests:
    # gradle test runs Testcontainers (Postgis-flavored Postgres in Docker).
    # ubuntu runners ship Docker, so this Just Works without service containers.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - name: Run backend tests + coverage
        run: ./gradlew test koverXmlReport
        working-directory: backend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/build/reports/kover/report.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-report
          path: backend/build/reports/kover/
          retention-days: 7

  smoke:
    # End-to-end: importer hydrates Postgres from data/, backend serves
    # static site + /api/*, Playwright-JVM drives Chromium against it.
    # Mirrors the local `make qa` flow.
    runs-on: ubuntu-latest
    needs: backend-tests
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: roadtrip
          POSTGRES_USER: roadtrip
          POSTGRES_PASSWORD: roadtrip
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roadtrip"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ROADTRIP_DB_URL: jdbc:postgresql://localhost:5432/roadtrip
      ROADTRIP_DB_USER: roadtrip
      ROADTRIP_DB_PASSWORD: roadtrip
      ROADTRIP_DATA_DIR: ${{ github.workspace }}/data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Build backend fat-jar
        run: ./gradlew shadowJar
        working-directory: backend

      # 'all' = uscampgrounds + alberta-provincial + parks-canada + state-parks
      # + national-parks + osm-pf. Smoke only needs uscampgrounds + parks-canada
      # for the Tunnel Mountain assertion, but importing all keeps the smoke
      # representative of the live data shape.
      - name: Import POI sources
        run: ./gradlew importer --args=all
        working-directory: backend

      - name: Start backend
        run: |
          jar=$(ls backend/build/libs/roadtrip-backend-*-all.jar | head -1)
          PORT=8765 ROADTRIP_STATIC_DIR="${{ github.workspace }}" \
            nohup java -jar "$jar" > backend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:8765/api/health >/dev/null; then
              echo "backend up"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to start"; tail -100 backend.log; exit 1

      - name: Install Playwright Chromium
        run: ./gradlew installPlaywrightBrowsers
        working-directory: backend

      - name: Run smoke
        run: QA_BASE_URL=http://127.0.0.1:8765 ./gradlew test --tests ca.floo.roadtrip.SmokeTest --tests ca.floo.campsite.CampsiteSmokeTest --rerun -x generateJooq
        working-directory: backend

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: backend/build/reports/tests/test/
          retention-days: 7
