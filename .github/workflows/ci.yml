name: CI

# Build-only. No auto-deploy — `make deploy` from a laptop is the production
# path (mini-ca runs the prod container).
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    # gradle test runs Testcontainers (Postgis-flavored Postgres in Docker).
    # ubuntu runners ship Docker, so this Just Works without service containers.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run backend tests
        run: gradle test
        working-directory: backend

  smoke:
    # End-to-end: importer hydrates Postgres from data/, backend serves
    # /api/pois, server.py proxies it, Playwright drives Chromium against the
    # composed stack. Mirrors the local `make qa` flow.
    runs-on: ubuntu-latest
    needs: backend-tests
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: roadtrip
          POSTGRES_USER: roadtrip
          POSTGRES_PASSWORD: roadtrip
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roadtrip"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ROADTRIP_DB_URL: jdbc:postgresql://localhost:5432/roadtrip
      ROADTRIP_DB_USER: roadtrip
      ROADTRIP_DB_PASSWORD: roadtrip
      ROADTRIP_DATA_DIR: ${{ github.workspace }}/data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend fat-jar
        run: gradle shadowJar
        working-directory: backend

      # 'all' = uscampgrounds + alberta-provincial + parks-canada + state-parks
      # + national-parks + osm-pf. Smoke only needs uscampgrounds + parks-canada
      # for the Tunnel Mountain assertion, but importing all keeps the smoke
      # representative of the live data shape.
      - name: Import POI sources
        run: gradle importer --args=all
        working-directory: backend

      - name: Start backend
        run: |
          jar=$(ls backend/build/libs/roadtrip-backend-*-all.jar | head -1)
          nohup java -jar "$jar" > backend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:8080/api/pois/health >/dev/null; then
              echo "backend up"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to start"; tail -100 backend.log; exit 1

      - name: Start static server (server.py)
        run: |
          ROADTRIP_BACKEND_URL=http://127.0.0.1:8080 python3 server.py &
          for i in $(seq 1 20); do
            if curl -sSf http://127.0.0.1:8765/api/health >/dev/null; then
              echo "server.py up"; exit 0
            fi
            sleep 1
          done
          echo "server.py failed to start"; exit 1

      - name: Install Playwright + Chromium
        run: |
          npm ci || npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
        working-directory: qa

      - name: Run smoke
        run: QA_BASE_URL=http://127.0.0.1:8765 npm test
        working-directory: qa

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: qa/test-results/
          retention-days: 7
