name: Deploy

# Mirrors `make deploy` from a laptop: ssh to mini-ca, fast-forward, rebuild
# the backend fat-jar, redeploy the docker-compose stack. Wraps a Tailscale
# join (mini-ca isn't on the public internet) around the SSH step.
#
# Triggers only when files that affect the running service change. Doc-only
# pushes, RFCs, and Tilt config don't burn deploy minutes. Manual override
# via workflow_dispatch for "redeploy without a code change" needs.

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'data/**'
      - 'docker-compose*.yml'
      - 'index.html'
      - 'web/**'
      - 'app.js'
      - 'style.css'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

# Don't queue concurrent deploys — if a second push lands while the first
# is still running, cancel-in-progress would risk leaving the stack in a
# partial state. Serial: latest push waits, but completes the running run.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Optional: bind to a GitHub Environment if you want approval gates or
    # per-env secrets. Leaving unset for now keeps things simple.
    # environment: production
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Join the tailnet so we can ssh mini-ca over Tailscale. OAuth client
      # is preferred over a static auth key: scoped to the `ci` tag, the
      # node is ephemeral, and the credentials can be rotated without
      # touching the workflow.
      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pinned host key — fail fast if mini-ca's identity ever changes.
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # Mirrors the laptop `make deploy` command. Single ssh invocation so
      # any failure (git pull, gradle build, compose up) returns non-zero
      # and fails the workflow.
      - name: Deploy on mini-ca
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST || 'mini-ca' }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER || 'mini' }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '~/workspace/roadtrip' }}
        run: |
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $DEPLOY_DIR && git pull --ff-only && (cd backend && ./gradlew shadowJar) && docker compose --profile tunnel --profile pois up -d --build"

      - name: Health check
        run: |
          # Probe via the public tunnel URL so we're verifying what users see,
          # not the LAN-side container. Override DEPLOY_HEALTH_URL via repo
          # variable if the tunnel hostname changes.
          url="${{ vars.DEPLOY_HEALTH_URL || 'https://roadtrip.floo.ca/api/health' }}"
          for _ in $(seq 1 30); do
            if curl -fsS "$url" >/dev/null; then
              echo "health: $url OK"
              exit 0
            fi
            sleep 2
          done
          echo "health check failed: $url"
          exit 1
