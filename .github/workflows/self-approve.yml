name: Self-approve

on:
  issue_comment:
    types: [created]

jobs:
  self-approve:
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'wwchen' &&
      github.event.comment.body == 'lgtm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.SELF_APPROVE_APPID }}
          private-key: ${{ secrets.SELF_APPROVE_PRIVATEKEY }}

      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: gh pr review "$PR_NUMBER" --repo "$REPO" --approve
