# cloudflared ingress rules. The tunnel itself is identified by the
# CLOUDFLARE_TUNNEL_TOKEN env var; routing inside the tunnel is configured
# here. The Kotlin backend serves the entire site (static + /api/*), so this
# is a single catch-all.
#
# IMPORTANT: cloudflared with a tunnel TOKEN runs in "remote-managed" mode
# and the dashboard configuration takes precedence over this file UNLESS
# the dashboard's "Public Hostname" config is empty. To use this file:
#   1. Cloudflare dashboard → Zero Trust → Networks → Tunnels → roadtrip
#   2. Public Hostname tab → delete any existing rules (they override config.yml)
#   3. cloudflared will then fall back to /etc/cloudflared/config.yml

ingress:
  - service: http://backend:8765
