# Codecov configuration. The Kover XML uploaded from .github/workflows/ci.yml
# is the only source — kover excludes generated jOOQ + main entrypoints
# already, but we mirror those ignores here so Codecov's UI matches.

coverage:
  status:
    project:
      default:
        # Codecov's denominator differs from Kover's local line metric; this
        # keeps the project gate above the current master baseline while Kover
        # remains the stricter local hard gate.
        target: 43%
        threshold: 0.5%
    patch:
      default:
        # New/changed backend code should carry tests. Keep a small threshold
        # for docs/config/test-only patches, but fail real untested code drift.
        target: 60%
        threshold: 5%

comment:
  layout: "diff, files, footer"
  behavior: default
  require_changes: false

ignore:
  # Generated by jOOQ codegen at build time. Match build.gradle.kts kover excludes.
  - "backend/build/generated/**"
  - "**/db/generated/**"
  # Main entrypoints — main()/CLI tools — not meaningfully testable.
  - "backend/src/main/kotlin/ca/floo/roadtrip/Main.kt"
  - "backend/src/main/kotlin/ca/floo/roadtrip/importer/Importer.kt"
  - "backend/src/main/kotlin/ca/floo/campsite/recgov/booker/tools/**"
