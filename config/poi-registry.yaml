# config/poi-registry.yaml
#
# One file. Both Python (scripts/_envelope.py) and Kotlin (PoiRegistry.kt)
# read it. Adding a new vendor = one entry under data_sources + one
# Kotlin ETL class registered in EtlOrchestrator.registry.

data_sources:
  # Federal campgrounds via RIDB (recreation.gov backend). One entry per
  # agency; same fetcher script + ETL adapter, args.agency selects the
  # RIDB org. Auth via RIDB_API_KEY env var.
  - slug: nps-campgrounds
    name: NPS Campgrounds
    enabled: true
    category: campground
    legend_bucket: federal
    fetcher:
      executor: python3
      filename: scripts/fetch_recgov.py
      args: { agency: NPS, slug: nps-campgrounds }
      output_dir_prefix: data/raw/nps-campgrounds
    etl_adapter: RecGovCampgroundsEtl
    data_provider:
      vendor: recgov
      host: www.recreation.gov
      name: Recreation.gov
      adapter: RecGovAdapter

  - slug: usfs-campgrounds
    name: USFS Campgrounds
    enabled: true
    category: campground
    legend_bucket: federal
    fetcher:
      executor: python3
      filename: scripts/fetch_recgov.py
      args: { agency: USFS, slug: usfs-campgrounds }
      output_dir_prefix: data/raw/usfs-campgrounds
    etl_adapter: RecGovCampgroundsEtl
    data_provider:
      vendor: recgov
      host: www.recreation.gov
      name: Recreation.gov
      adapter: RecGovAdapter

  - slug: blm-campgrounds
    name: BLM Campgrounds
    enabled: true
    category: campground
    legend_bucket: federal
    fetcher:
      executor: python3
      filename: scripts/fetch_recgov.py
      args: { agency: BLM, slug: blm-campgrounds }
      output_dir_prefix: data/raw/blm-campgrounds
    etl_adapter: RecGovCampgroundsEtl
    data_provider:
      vendor: recgov
      host: www.recreation.gov
      name: Recreation.gov
      adapter: RecGovAdapter

  - slug: usace-campgrounds
    name: Army Corps of Engineers Campgrounds
    enabled: true
    category: campground
    legend_bucket: federal
    fetcher:
      executor: python3
      filename: scripts/fetch_recgov.py
      args: { agency: USACE, slug: usace-campgrounds }
      output_dir_prefix: data/raw/usace-campgrounds
    etl_adapter: RecGovCampgroundsEtl
    data_provider:
      vendor: recgov
      host: www.recreation.gov
      name: Recreation.gov
      adapter: RecGovAdapter

  - slug: padus-national-parks
    name: US National Parks (PAD-US polygons)
    enabled: false
    category: national-park
    fetcher:
      executor: python3
      filename: scripts/fetch_parks.py
      args: { layer: national-parks }
      output_dir_prefix: data/raw/padus-national-parks
    etl_adapter: PadusNpEtl

  - slug: padus-state-parks
    name: US State Parks (PAD-US polygons)
    enabled: false
    category: state-park
    fetcher:
      executor: python3
      filename: scripts/fetch_parks.py
      args: { layer: state-parks }
      output_dir_prefix: data/raw/padus-state-parks
    etl_adapter: PadusSpEtl

  - slug: bcparks-strapi
    name: BC Provincial Parks
    enabled: true
    category: campground
    legend_bucket: provincial
    fetcher:
      executor: python3
      filename: scripts/fetch_bc_parks.py
      output_dir_prefix: data/raw/bcparks-strapi
    etl_adapter: BcParksStrapiEtl
    data_provider:
      vendor: aspira
      host: camping.bcparks.ca
      name: Aspira (BC Parks)
      adapter: AspiraAdapter

  - slug: reserveamerica-abpp
    name: Alberta Provincial Parks
    enabled: true
    category: campground
    legend_bucket: provincial
    fetcher:
      executor: python3
      filename: scripts/fetch_reserveamerica.py
      args: { tenant: ABPP }
      output_dir_prefix: data/raw/reserveamerica-abpp
    etl_adapter: ReserveAmericaEtl
    data_provider:
      vendor: reserveamerica
      host: shop.albertaparks.ca
      name: ReserveAmerica (Alberta)
      adapter: ""

  - slug: uscampgrounds
    name: US Campgrounds (uscampgrounds.info)
    enabled: false
    category: campground
    # Per-row legend_bucket — the source CSVs already classify each
    # entry as federal/state/local/private (typeLabel column), so the
    # ETL stamps it from the row instead of statically.
    fetcher:
      executor: python3
      filename: scripts/fetch_campgrounds.py
      output_dir_prefix: data/raw/uscampgrounds
    etl_adapter: UsCampgroundsEtl

  - slug: osm-pf
    name: Planet Fitness
    enabled: true
    category: planet-fitness
    fetcher:
      executor: python3
      filename: scripts/fetch_planet_fitness.py
      output_dir_prefix: data/raw/osm-pf
    etl_adapter: PlanetFitnessEtl

  - slug: tesla-index
    name: Tesla Superchargers
    enabled: true
    category: supercharger
    fetcher:
      executor: python3
      filename: scripts/fetch_tesla_index.py
      enabled: false       # Akamai blocks us; cookies stale. Import from existing raw cache only.
      output_dir_prefix: data/raw/tesla-index
    etl_adapter: TeslaIndexEtl

  - slug: tesla-locations
    name: Tesla Supercharger details
    enabled: true
    category: supercharger
    fetcher:
      executor: python3
      filename: scripts/fetch_tesla_locations.py
      enabled: false       # Same as tesla-index — cookies stale. Side-loaded by TeslaIndexEtl from cache.
      output_dir_prefix: data/raw/tesla-locations
    depends_on: [tesla-index]
