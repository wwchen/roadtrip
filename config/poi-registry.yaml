# config/poi-registry.yaml
#
# Two sections.
# 1. data_sources — fetchers. Pure network acquisition. Output to data/raw/<slug>/.
#    Always wired up; the IngestController will run a fetcher whenever it's
#    asked to. Unreachable upstreams produce failed runs, not boot failures.
# 2. poi_data    — POI datasets. Each row carries `name`, optional `enabled`
#    (default true), `category`, optional `subcategory`, and an ordered
#    `etls:` list. The LAST entry in `etls:` is the POI emitter (must output
#    Poi.*); earlier entries are intermediates whose typed payload is handed
#    to the next stage in memory (every ETL is f(inputs) → output, so re-
#    running is the recovery path; nothing materializes to disk). List order
#    is dependency order — entry N may only reference data_source slugs OR
#    earlier `etls:` siblings in the SAME row via `inputs:`. Cycles, forward
#    references, and cross-row etl refs are rejected at boot.
#    `enabled: false` skips the row in fan-out import; per-name imports still
#    run it on request.
#
# Booking provider info is NOT in this file. ETLs that need it hard-code
# their ProviderRef variant and resolve the booking_provider FK at transform
# time via TransformCtx.bookingProviderId(vendor, host); the value of `host`
# comes from the etl's args. Seeding of booking_provider rows happens
# separately (see backend/src/main/resources/db/migration/).

# ============================================================================
# data_sources — fetchers
# ============================================================================
data_sources:
  # --- Aspira /api/maps (one fetcher, three tenants via args.host) -----------
  - slug: aspira-maps-wa
    name: Aspira maps (Washington State Parks)
    fetcher:
      executor: python3
      filename: scripts/fetch_aspira_maps.py
      args: { host: washington.goingtocamp.com }
      output_dir_prefix: data/raw/aspira-maps-wa

  - slug: aspira-maps-bc
    name: Aspira maps (BC Parks)
    fetcher:
      executor: python3
      filename: scripts/fetch_aspira_maps.py
      args: { host: camping.bcparks.ca }
      output_dir_prefix: data/raw/aspira-maps-bc

  - slug: aspira-maps-pc
    name: Aspira maps (Parks Canada)
    fetcher:
      executor: python3
      filename: scripts/fetch_aspira_maps.py
      args: { host: reservation.pc.gc.ca }
      output_dir_prefix: data/raw/aspira-maps-pc

  # --- Geometry-side feeds (joined into Aspira pins) -------------------------
  - slug: uscampgrounds
    name: uscampgrounds.info CSV
    fetcher:
      executor: python3
      filename: scripts/fetch_campgrounds.py
      output_dir_prefix: data/raw/uscampgrounds

  - slug: bcparks-strapi
    name: BC Parks Strapi
    fetcher:
      executor: python3
      filename: scripts/fetch_bc_parks.py
      output_dir_prefix: data/raw/bcparks-strapi

  - slug: apca-accommodation
    name: Parks Canada Accommodation (ArcGIS)
    fetcher:
      executor: python3
      filename: scripts/fetch_arcgis_layer.py
      args:
        url: https://services2.arcgis.com/wCOMu5IS7YdSyPNx/arcgis/rest/services/vw_Accommodation_Hebergement_V2_FGP/FeatureServer/0
        where: "Accommodation_Type='Camping'"
      output_dir_prefix: data/raw/apca-accommodation

  - slug: apca-places
    name: Parks Canada Places polygon centroids (ArcGIS)
    fetcher:
      executor: python3
      filename: scripts/fetch_arcgis_layer.py
      args:
        url: https://services2.arcgis.com/wCOMu5IS7YdSyPNx/arcgis/rest/services/vw_Places_Public_lieux_public_APCA/FeatureServer/0
        return_centroid: true
      output_dir_prefix: data/raw/apca-places

  # --- Federal campgrounds (RIDB) --------------------------------------------
  # One capture covers every RIDB-publishing agency (NPS, USFS, BLM, USACE,
  # FWS, BOR, TVA, …). Per-row agency lands on Poi.Campground.agency at
  # transform time from ORGANIZATION[0].OrgAbbrevName.
  - slug: recgov-campgrounds
    name: Federal campgrounds via RIDB (all agencies)
    fetcher:
      executor: python3
      filename: scripts/fetch_recgov.py
      args: { slug: recgov-campgrounds }
      output_dir_prefix: data/raw/recgov-campgrounds

  # --- Federal campsites (rec.gov per-facility catalog, RFC 0008) -----------
  # Walks the recgov-campgrounds capture for FacilityIDs and calls rec.gov's
  # /api/camps/availability/campground/{id}/month per facility. The body's
  # `campsites` field is the catalog (id, site, loop, equipment_types, ...).
  # Per-day availability data is in the same response but not stored here —
  # request-time availability stays in CachedAvailability.
  #
  # Heavy fetch (~75min for 3000 facilities at 1.5s gap). Run independently
  # of recgov-campgrounds so the campground-list refresh stays snappy.
  - slug: recgov-campsites
    name: Federal campsites via rec.gov per-facility /month
    fetcher:
      executor: python3
      filename: scripts/fetch_recgov_campsites.py
      args: { slug: recgov-campsites }
      output_dir_prefix: data/raw/recgov-campsites

  # --- Alberta provincial parks ----------------------------------------------
  - slug: reserveamerica-abpp
    name: ReserveAmerica Alberta park HTML
    fetcher:
      executor: python3
      filename: scripts/fetch_reserveamerica.py
      args: { tenant: ABPP }
      output_dir_prefix: data/raw/reserveamerica-abpp

  # --- Planet Fitness --------------------------------------------------------
  - slug: osm-pf
    name: Planet Fitness via OSM
    fetcher:
      executor: python3
      filename: scripts/fetch_planet_fitness.py
      output_dir_prefix: data/raw/osm-pf

  # --- Tesla superchargers ---------------------------------------------------
  # Akamai blocks fetch; rely on the existing data/raw/ cache. Fan-out fetch
  # will mark these targets failed; the poi_data row is enabled: false so
  # fan-out import skips them.
  - slug: tesla-index
    name: Tesla supercharger index
    fetcher:
      executor: python3
      filename: scripts/fetch_tesla_index.py
      output_dir_prefix: data/raw/tesla-index

  - slug: tesla-locations
    name: Tesla supercharger detail pages
    fetcher:
      executor: python3
      filename: scripts/fetch_tesla_locations.py
      output_dir_prefix: data/raw/tesla-locations
    depends_on: [tesla-index]

# ============================================================================
# poi_data — POI datasets. Each row owns its ETL chain. pois.source = the
# last `etls:` entry's slug. Upsert sweep scope follows.
# ============================================================================
poi_data:
  - name: Federal Campgrounds
    category: campground
    subcategory: federal
    etls:
      - slug: federal-campgrounds
        adapter: RecGovCampgroundsEtl
        inputs: [recgov-campgrounds]

  - name: Washington State Parks
    category: campground
    subcategory: state
    etls:
      - slug: aspira-leaves-wa
        adapter: AspiraLeavesEtl
        inputs: [aspira-maps-wa]
      - slug: aspira-wa-pins
        adapter: AspiraJoinByNameEtl
        inputs: [aspira-leaves-wa, uscampgrounds]
        args:
          host: washington.goingtocamp.com
          state_filter: WA

  - name: BC Provincial Parks
    category: campground
    subcategory: provincial
    etls:
      - slug: aspira-leaves-bc
        adapter: AspiraLeavesEtl
        inputs: [aspira-maps-bc]
      - slug: aspira-bc-pins
        adapter: AspiraJoinByNameEtl
        inputs: [aspira-leaves-bc, bcparks-strapi]
        args:
          host: camping.bcparks.ca

  - name: Parks Canada
    category: campground
    subcategory: federal
    etls:
      - slug: aspira-leaves-pc
        adapter: AspiraLeavesEtl
        inputs: [aspira-maps-pc]
      - slug: aspira-pc-pins
        adapter: AspiraJoinByNameEtl
        inputs: [aspira-leaves-pc, apca-accommodation, apca-places]
        args:
          host: reservation.pc.gc.ca
          parent_name_fallback: true

  - name: Alberta Provincial Parks
    category: campground
    subcategory: provincial
    etls:
      - slug: alberta-provincial
        adapter: ReserveAmericaEtl
        inputs: [reserveamerica-abpp]

  - name: Planet Fitness
    category: planet-fitness
    etls:
      - slug: planet-fitness
        adapter: PlanetFitnessEtl
        inputs: [osm-pf]

  - name: Tesla Superchargers
    # Akamai blocks the fetch; fan-out import would just see stale data
    # if the cache is missing. Trigger explicitly via per-name import
    # when the cache is fresh.
    enabled: false
    category: supercharger
    etls:
      # tesla-locations is side-loaded from ctx.rawDir per-slug rather
      # than declared as an input, because the per-slug filesystem layout
      # doesn't fit the InputBundle's flat envelope contract.
      - slug: tesla-superchargers
        adapter: TeslaIndexEtl
        inputs: [tesla-index]

# ============================================================================
# reservable_data — reservable catalogs (RFC 0008). Each row's terminal etl
# emits ReservableEtlOutput; the orchestrator upserts via ReservableRepo.
# No POI knowledge in these ETLs — see poi_reservable_joiner below for
# the linking concern.
# ============================================================================
reservable_data:
  - name: Federal Campsites
    etls:
      - slug: federal-campsites
        adapter: RecGovCampsitesEtl
        inputs: [recgov-campsites]
