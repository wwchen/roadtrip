# POI registry — source of truth for governing bodies + booking providers
# + the per-source fetcher recipes.
#
# Both Python (bin/refresh) and Kotlin (backend boot) read this. Backend
# UPSERTs governing_body + booking_provider rows from here on every boot;
# runs that reference a slug not declared here fail loudly. Adding a new
# vendor = one entry here + a Kotlin ETL impl + maybe a fetcher script.
# No Flyway migration to add a vendor.
#
# Contract:
#   slugs are stable, kebab-case, never change without coordinated cleanup
#   booking_providers are declared once globally; governing-body source
#   rows reference them by (vendor, host)

governing_bodies:
  # ----- US federal — all route through Recreation.gov -----
  # Operating-agency → booking-system facts that don't change. The drawer-
  # payload assembler reads these to compose CTAs ("Reserve on rec.gov")
  # without per-vendor branches.
  - slug: nps
    name: National Park Service
    kind: federal
    country: US
    booking_provider: { vendor: recgov, host: www.recreation.gov }
    sources:
      - id: padus-np
        fetcher: fetch_parks
        args:
          layer: national-parks

  # Other recgov-routed federal agencies (USFS, BLM, COE, USFW, BOR, TVA,
  # NM, NRA) and unbookable US state/local/private buckets used to live
  # here as empty placeholders. Removed: a body with no source can't
  # populate any POIs, and the empty entries just clutter the contract.
  # Re-add when there's a fetcher for that agency.

  # ----- US state -----
  - slug: us-state-park
    name: US State Parks
    kind: state
    country: US
    sources:
      - id: padus-sp
        fetcher: fetch_parks
        args:
          layer: state-parks
      - id: aspira-maps-wa
        fetcher: fetch_aspira_maps
        args:
          host: washington.goingtocamp.com
          source: aspira-maps-wa
        booking_provider: { vendor: aspira, host: washington.goingtocamp.com }

  # ----- Canada -----
  - slug: parks-canada
    name: Parks Canada
    kind: federal
    country: CA
    booking_provider: { vendor: aspira, host: reservation.pc.gc.ca }
    sources:
      - id: aspira-maps-pc
        fetcher: fetch_aspira_maps
        args:
          host: reservation.pc.gc.ca
          source: aspira-maps-pc
        booking_provider: { vendor: aspira, host: reservation.pc.gc.ca }

  - slug: bc-parks
    name: BC Parks
    kind: provincial
    country: CA
    booking_provider: { vendor: aspira, host: camping.bcparks.ca }
    sources:
      - id: bcparks-strapi
        fetcher: fetch_bc_parks   # scripts/fetch_bc_parks.py
      - id: aspira-maps-bc
        fetcher: fetch_aspira_maps
        args:
          host: camping.bcparks.ca
          source: aspira-maps-bc
        booking_provider: { vendor: aspira, host: camping.bcparks.ca }

  - slug: alberta-parks
    name: Alberta Parks
    kind: provincial
    country: CA
    booking_provider: { vendor: reserveamerica, host: shop.albertaparks.ca }
    sources:
      - id: reserveamerica-abpp
        fetcher: fetch_reserveamerica
        # Tenant config lives in the Python fetcher's TENANTS map; default
        # walks every configured tenant. Pass --tenant=ABPP to scope.
        booking_provider: { vendor: reserveamerica, host: shop.albertaparks.ca }

  # ----- Corporate -----
  - slug: tesla
    name: Tesla
    kind: corporate
    sources:
      # Both tesla-* sources need curl-impersonate + fresh Akamai cookies,
      # both bound to the host that minted them. Run via
      # `make refresh-superchargers` (docker image with curl-impersonate
      # baked in) after `make refresh-cookies-local`. Excluded from the
      # `make data-fetch` fan-out so routine refreshes don't burn the
      # Akamai budget on a fetcher that's going to fail anyway.
      - id: tesla-index
        fetcher: fetch_tesla_index
        manual: true
      - id: tesla-locations
        fetcher: fetch_tesla_locations
        depends_on: [tesla-index]   # locations script reads the index
        manual: true

  - slug: pf
    name: Planet Fitness Corp
    kind: corporate
    country: US
    sources:
      - id: osm-pf
        fetcher: fetch_planet_fitness

# ----------------------------------------------------------------------
# Booking providers: the reservation systems the FE deeplinks/heat-strips
# against. Vendor + host is the unique key. Adapter class is the Kotlin
# class the availability route loads (PR 4); empty string = no adapter
# yet, availability returns no_provider.
# ----------------------------------------------------------------------
booking_providers:
  - vendor: recgov
    host: www.recreation.gov
    name: Recreation.gov
    adapter_class: RecGovAdapter

  - vendor: aspira
    host: reservation.pc.gc.ca
    name: Aspira NextGen (Parks Canada)
    adapter_class: AspiraAdapter

  - vendor: aspira
    host: camping.bcparks.ca
    name: Aspira NextGen (BC Parks)
    adapter_class: AspiraAdapter

  - vendor: aspira
    host: washington.goingtocamp.com
    name: Aspira NextGen (WA State Parks)
    adapter_class: AspiraAdapter

  - vendor: reserveamerica
    host: shop.albertaparks.ca
    name: ReserveAmerica (Alberta Parks)
    adapter_class: ""   # not implemented; row exists so AB data can FK to it. Vendor is Active Network's ReserveAmerica platform.
