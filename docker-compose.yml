services:
  # cookie-bot sidecar — kept for future use but not started by default on
  # aarch64 hosts (see memory: akamai_http2_fingerprinting.md). To enable,
  # run with `--profile cookie-bot` on an amd64 host (or with a paid-solver
  # backend), then set COOKIE_BOT_URL=http://cookie-bot:8080 in .env.
  # Used only by the offline refresh worker (scripts/fetch_tesla_{index,locations}.py),
  # not by the live serving stack.
  cookie-bot:
    profiles: [cookie-bot]
    build: ./cookie-bot
    restart: unless-stopped
    hostname: cookie-bot
    volumes:
      - ${COOKIE_BOT_DATA:-$HOME/.roadtrip-map/cookie-bot}:/var/cache/cookie-bot
    environment:
      - COOKIE_BOT_TOKEN=${COOKIE_BOT_TOKEN}
      - HEADLESS=true
      - LOG_LEVEL=INFO

  # Postgres + PostGIS (postgres:16 + postgis 3.4) so geom can be Geometry
  # (Polygon/MultiPolygon, not just Point) and GIST bbox queries work
  # without an extension install step.
  postgres:
    profiles: [pois]
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    hostname: postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-roadtrip}
      - POSTGRES_USER=${POSTGRES_USER:-roadtrip}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-roadtrip}
    volumes:
      - ${POSTGRES_DATA:-$HOME/.roadtrip-map/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-roadtrip} -d $${POSTGRES_DB:-roadtrip}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Kotlin/Ktor backend. Serves the entire site:
  #   - GET /                       → index.html
  #   - GET /web/*, /data/*         → static files (data/pricing-cache/ excluded)
  #   - GET /api/pois               → bbox query against postgres
  #   - GET /api/pricing/{slug}     → cache-only read of data/pricing-cache/{slug}.json
  #   - GET /api/health             → status snapshot (cache count + db ping)
  # Static files come from the repo bind-mount so deploys are git-pull +
  # docker compose up — no Dockerfile rebuild needed for HTML/JS/data changes.
  backend:
    profiles: [pois]
    build: ./backend
    restart: unless-stopped
    hostname: backend
    environment:
      - PORT=8765
      - ROADTRIP_STATIC_DIR=/app/static
      - ROADTRIP_DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-roadtrip}
      - ROADTRIP_DB_USER=${POSTGRES_USER:-roadtrip}
      - ROADTRIP_DB_PASSWORD=${POSTGRES_PASSWORD:-roadtrip}
      # Mapbox is server-side only. /api/route (Directions) and /api/geocode
      # (forward geocoding) read this; the FE never sees the token. Both
      # endpoints return 503 when unset, so the trip planner just doesn't
      # work, instead of leaking the token by accident.
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}
    volumes:
      - ./index.html:/app/static/index.html:ro
      - ./web:/app/static/web:ro
      - ./data:/app/static/data:ro
    depends_on:
      postgres:
        condition: service_healthy

  cloudflared:
    # Only runs with `--profile tunnel` (deploy target). Local modes skip it.
    # Mounts a config.yml so path-based routing lives in the repo, not the
    # dashboard. With backend serving everything, the config is now a single
    # catch-all.
    profiles: [tunnel]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - backend
