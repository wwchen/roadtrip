services:
  app:
    build: .
    restart: unless-stopped
    hostname: app
    volumes:
      # Pricing cache (lazy-populated by user clicks, 30-day TTL)
      - ${CACHE_DIR:-$HOME/.roadtrip-map/pricing-cache}:/app/data/pricing-cache
      # .env is read by server.py's load_env(). We mount it instead of using
      # `env_file:` because Compose interpolates $VAR sequences inside env_file
      # values, which mangles Tesla cookies (e.g. _ga_*=...$o1$g1$t...).
      - ./.env:/app/.env:ro
    environment:
      - PORT=8765
    # For local port publishing, use docker-compose.local.yml (see Makefile).

  # cookie-bot sidecar — kept for future use but not started by default on
  # aarch64 hosts (see memory: akamai_http2_fingerprinting.md). To enable,
  # run with `--profile cookie-bot` on an amd64 host (or with a paid-solver
  # backend), then set COOKIE_BOT_URL=http://cookie-bot:8080 in .env.
  cookie-bot:
    profiles: [cookie-bot]
    build: ./cookie-bot
    restart: unless-stopped
    hostname: cookie-bot
    volumes:
      - ${COOKIE_BOT_DATA:-$HOME/.roadtrip-map/cookie-bot}:/var/cache/cookie-bot
    environment:
      - COOKIE_BOT_TOKEN=${COOKIE_BOT_TOKEN}
      - HEADLESS=true
      - LOG_LEVEL=INFO

  # Phase 2 backend store. PostGIS image (postgres:16 + postgis 3.4) so the
  # geom column can be Geometry (Polygon/MultiPolygon, not just Point) and
  # GIST bbox queries work without an extension install step.
  postgres:
    profiles: [pois]
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    hostname: postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-roadtrip}
      - POSTGRES_USER=${POSTGRES_USER:-roadtrip}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-roadtrip}
    volumes:
      - ${POSTGRES_DATA:-$HOME/.roadtrip-map/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-roadtrip} -d $${POSTGRES_DB:-roadtrip}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Kotlin/Ktor /api/pois service. Reads from postgres on the compose
  # network. The fat-jar is built on the host (`make backend-build`) and
  # baked into this image — see backend/Dockerfile for why.
  backend:
    profiles: [pois]
    build: ./backend
    restart: unless-stopped
    hostname: backend
    environment:
      - PORT=8080
      - ROADTRIP_DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-roadtrip}
      - ROADTRIP_DB_USER=${POSTGRES_USER:-roadtrip}
      - ROADTRIP_DB_PASSWORD=${POSTGRES_PASSWORD:-roadtrip}
    depends_on:
      postgres:
        condition: service_healthy

  cloudflared:
    # Only runs with `--profile tunnel` (deploy target). Local modes skip it.
    # Mounts a config.yml so path-based routing (/api/pois → backend,
    # /api/pricing + /* → app) lives in the repo, not the dashboard.
    profiles: [tunnel]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - app
