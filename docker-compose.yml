services:
  app:
    build: .
    restart: unless-stopped
    hostname: app
    volumes:
      # Pricing cache (lazy-populated by user clicks, 30-day TTL)
      - ${CACHE_DIR:-$HOME/.roadtrip-map/pricing-cache}:/app/data/pricing-cache
      # .env is read by server.py's load_env(). We mount it instead of using
      # `env_file:` because Compose interpolates $VAR sequences inside env_file
      # values, which mangles Tesla cookies (e.g. _ga_*=...$o1$g1$t...).
      - ./.env:/app/.env:ro
    environment:
      - PORT=8765
    # For local port publishing, use docker-compose.local.yml (see Makefile).

  cloudflared:
    # Only runs with `--profile tunnel` (deploy target). Local modes skip it.
    profiles: [tunnel]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
