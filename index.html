<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#e82127">
<title>Roadtrip Map</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent; }
  #map { position: absolute; inset: 0; }

  #panel-toggle {
    display: none;
    position: absolute; z-index: 2;
    top: max(10px, env(safe-area-inset-top)); left: 10px;
    width: 40px; height: 40px; padding: 0;
    background: #fff; border: none; border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    font-size: 20px; cursor: pointer;
  }
  #panel {
    position: absolute; top: 10px; left: 10px; z-index: 1;
    background: rgba(255,255,255,0.96); padding: 10px 12px; border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2); font-size: 13px; line-height: 1.4;
    max-width: 260px; max-height: calc(100vh - 20px); overflow-y: auto;
  }
  #panel h1 { margin: 0 0 6px; font-size: 14px; font-weight: 600; }
  #panel label { display: block; margin: 2px 0; cursor: pointer; user-select: none; }
  #panel label input { margin-right: 6px; vertical-align: middle; }
  #panel .count { color: #666; font-size: 11px; }
  #panel .status { color: #666; font-size: 11px; margin-top: 6px; }

  @media (max-width: 640px) {
    #panel-toggle { display: block; }
    #panel {
      top: max(10px, env(safe-area-inset-top)); left: 10px; right: 10px;
      max-width: none; max-height: 75vh;
      padding: 12px 14px;
      font-size: 14px; line-height: 1.5;
      transform: translateY(-110%); transition: transform 0.2s ease;
    }
    #panel.open { transform: translateY(0); }
    #panel label { margin: 8px 0; padding: 2px 0; }
    #panel label input { width: 18px; height: 18px; margin-right: 10px; }
    .legend-dot { width: 12px; height: 12px; }
    #search { font-size: 16px !important; padding: 8px 10px !important; }  /* 16px prevents iOS zoom-on-focus */
    .sr-item { padding: 10px 8px; font-size: 14px; }
  }
  .legend-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle; border: 1px solid rgba(0,0,0,0.3);
  }
  /* Bottom-right geolocate control: respect home-bar safe area on iPhone. */
  .maplibregl-ctrl-bottom-right {
    bottom: max(20px, env(safe-area-inset-bottom));
    right: max(10px, env(safe-area-inset-right));
  }
  .maplibregl-ctrl-bottom-right .maplibregl-ctrl-group button {
    width: 44px; height: 44px;
  }
  .geo-banner {
    position: absolute; left: 50%; transform: translateX(-50%);
    bottom: calc(max(20px, env(safe-area-inset-bottom)) + 56px);
    background: rgba(40, 40, 40, 0.92); color: #fff;
    padding: 8px 14px; border-radius: 18px;
    font-size: 13px; z-index: 3;
    max-width: calc(100vw - 32px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  /* Popup: bottom-sheet style for one-handed iPhone reach. anchor='bottom' is
     set on the Popup constructor; the CSS just makes it scroll-friendly and
     bumps the type scale from the prior 12-13px to 14-17px. */
  .maplibregl-popup-content {
    max-width: calc(100vw - 24px) !important;
    max-height: 60vh; overflow-y: auto;
    touch-action: pan-y; overscroll-behavior: contain;
    padding: 14px 16px 12px;
    border-radius: 10px;
  }
  .maplibregl-popup-close-button {
    width: 44px; height: 44px; font-size: 22px;
    line-height: 44px; padding: 0; right: 0; top: 0;
  }
  .popup { font-size: 14px; line-height: 1.45; color: #222; }
  .popup h3 { margin: 0 0 2px; font-size: 16px; font-weight: 600; line-height: 1.25; padding-right: 32px; }
  .popup .sub { color: #666; font-size: 13px; margin-bottom: 8px; }
  .popup .meta { color: #555; }
  .popup .verdict {
    display: flex; align-items: center; gap: 6px;
    font-size: 15px; font-weight: 500;
    margin: 8px 0; padding: 6px 0;
  }
  .popup .verdict::before {
    content: ''; display: inline-block;
    width: 8px; height: 8px; border-radius: 50%;
    background: currentColor;
  }
  .popup .verdict.open  { color: #1b5e20; }
  .popup .verdict.closed { color: #b71c1c; }
  .popup .verdict.fcfs   { color: #5d4037; }
  .popup .actions { display: flex; flex-direction: column; gap: 8px; margin: 8px 0; }
  .popup .btn {
    display: flex; align-items: center; justify-content: center;
    width: 100%; box-sizing: border-box;
    padding: 0 14px; height: 48px;
    border-radius: 8px;
    font-size: 16px; font-weight: 600;
    text-decoration: none;
    -webkit-tap-highlight-color: rgba(0,0,0,0.1);
  }
  .popup .btn-primary { background: #1b5e20; color: #fff; }
  .popup .btn-primary:active { background: #154d18; }
  .popup .btn-secondary {
    background: #f5f5f5; color: #222;
    height: 44px;
    border: 1px solid #ddd;
  }
  .popup .btn-secondary:active { background: #e8e8e8; }
  .popup .btn-disabled {
    background: #f5f5f5; color: #999;
    height: 44px; border: 1px solid #eee;
    cursor: not-allowed;
  }
  .popup .pills {
    display: flex; flex-wrap: wrap; gap: 4px 6px;
    margin: 8px 0;
  }
  .popup .pill {
    display: inline-block; padding: 3px 9px;
    background: #eef1f4; color: #333;
    border-radius: 12px;
    font-size: 12px; font-weight: 500;
  }
  .popup .footer {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid #eee;
    color: #888; font-size: 11px;
  }
  .popup .footer.warn { color: #e65100; font-weight: 500; }
  .popup .tag {
    display: inline-block; padding: 1px 5px; border-radius: 3px; margin-right: 4px;
    background: #eee; font-size: 11px; text-transform: uppercase;
  }
  .popup .photo {
    display: block; width: 100%; max-height: 140px; object-fit: cover;
    border-radius: 4px; margin: 0 0 6px;
  }
  .popup .rating { color: #333; font-weight: 600; }
  .popup .rating .stars { color: #f5a623; letter-spacing: -1px; }
  .popup .rating .count { color: #777; font-weight: 400; font-size: 12px; margin-left: 3px; }
  .popup .cell { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
  .popup .cell-pill {
    display: inline-flex; align-items: baseline; gap: 3px;
    padding: 2px 7px; border-radius: 10px;
    font-size: 11px; font-weight: 600; color: #fff; line-height: 1.5;
  }
  .popup .cell-pill .carrier { font-size: 10px; opacity: 0.9; }
  .popup .cell-pill .val { font-variant-numeric: tabular-nums; }
  /* 0-4 scale: 0 = none (dark red), 1 = major issues (red), 2 = some (amber),
     3 = good (green), 4 = excellent (deep green) */
  .popup .cell-pill[data-bucket="0"] { background: #7a1e1e; }
  .popup .cell-pill[data-bucket="1"] { background: #c62828; }
  .popup .cell-pill[data-bucket="2"] { background: #e8a730; }
  .popup .cell-pill[data-bucket="3"] { background: #2e7d32; }
  .popup .cell-pill[data-bucket="4"] { background: #1b5e20; }
  #panel .section-label { font-size: 10px; text-transform: uppercase; color: #888; margin: 8px 0 2px; letter-spacing: 0.5px; }
  #panel .section-label:first-of-type { margin-top: 0; }
  #search-wrap { margin-bottom: 8px; position: relative; }
  #search {
    width: 100%; box-sizing: border-box; padding: 5px 8px;
    border: 1px solid #ccc; border-radius: 4px; font-size: 12px;
    font-family: inherit;
  }
  #search:focus { outline: none; border-color: #666; }
  #sort-nearest-row {
    display: flex; align-items: center; gap: 6px;
    margin-top: 4px; font-size: 11px; color: #555;
  }
  #sort-nearest-row.disabled { color: #aaa; }
  #sort-nearest-row label { cursor: pointer; }
  #sort-nearest-row.disabled label { cursor: default; }
  .sr-dist { color: #1b5e20; font-size: 11px; margin-left: 4px; font-variant-numeric: tabular-nums; }
  #search-results {
    position: absolute; left: 0; right: 0; top: 100%;
    max-height: 260px; overflow-y: auto;
    background: #fff; border: 1px solid #ccc; border-top: none; border-radius: 0 0 4px 4px;
    z-index: 10; display: none;
  }
  #search-results.open { display: block; }
  .sr-item { padding: 5px 8px; cursor: pointer; font-size: 12px; border-top: 1px solid #eee; }
  .sr-item:first-child { border-top: none; }
  .sr-item:hover, .sr-item.active { background: #f0f4f8; }
  .sr-kind { display: inline-block; font-size: 9px; text-transform: uppercase;
    padding: 1px 4px; border-radius: 2px; margin-right: 5px; color: #fff; vertical-align: middle; }
  .sr-sub { color: #777; font-size: 11px; }
  .rates { font-size: 12px; }
  .rate-row { display: flex; justify-content: space-between; padding: 1px 0; }
  .rate-header { font-weight: 600; margin-top: 2px; }
  .rate-tou { color: #666; font-size: 11px; }
  .rate-label { flex: 1; }
  .rate-val { font-variant-numeric: tabular-nums; }

  /* ---------- Campsite availability drawer (RFC 0003, ?drawer=1) ---------- */
  .cg-drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.12);
    pointer-events: none; /* let map gestures pass through */
    opacity: 0; transition: opacity 220ms cubic-bezier(0.32, 0.72, 0, 1);
    display: none; z-index: 998;
  }
  .cg-drawer-backdrop.open { opacity: 1; }

  .cg-drawer {
    position: fixed; left: 0; right: 0; bottom: 0;
    max-height: 60dvh;
    background: #fff;
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -8px 24px rgba(0,0,0,0.18);
    display: none; flex-direction: column;
    transform: translateY(100%);
    transition: transform 220ms cubic-bezier(0.32, 0.72, 0, 1), max-height 220ms ease;
    z-index: 999;
    padding: 8px 16px 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }
  .cg-drawer.open { transform: translateY(0); }
  .cg-drawer.full { max-height: 90dvh; }

  @media (min-width: 768px) {
    .cg-drawer {
      left: 0; right: auto; bottom: 0; top: 0;
      width: 420px; max-height: 100dvh;
      border-radius: 0;
      box-shadow: 8px 0 24px rgba(0,0,0,0.12);
      transform: translateX(-100%);
      padding: 16px 20px;
    }
    .cg-drawer.open { transform: translateX(0); }
    .cg-drawer-handle { display: none; }
  }

  .cg-drawer-handle {
    width: 36px; height: 4px;
    background: #ccc; border-radius: 2px;
    margin: 0 auto 8px;
    cursor: grab;
    touch-action: none;
  }
  .cg-drawer-close {
    position: absolute; top: 8px; right: 12px;
    width: 32px; height: 32px;
    background: #f0f0f0; border: 0; border-radius: 50%;
    font-size: 16px; color: #666; cursor: pointer;
    line-height: 1;
  }

  .cg-drawer-content { display: flex; flex-direction: column; }
  .cg-drawer-head h2 { margin: 0 0 2px; font-size: 17px; font-weight: 600; padding-right: 36px; }
  .cg-sub { color: #666; font-size: 13px; margin-bottom: 8px; }
  .cg-verdict-row { margin-bottom: 4px; }
  .cg-pill {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 500;
  }
  .cg-pill-open { background: #e8f5e9; color: #1b5e20; }
  .cg-pill-fcfs { background: #fff3e0; color: #b85c00; }

  .cg-availability { margin-top: 12px; }
  .cg-summary { font-size: 14px; color: #222; line-height: 1.4; }
  .cg-summary .cg-error { color: #b85c00; }
  .cg-summary .cg-retry { color: #b85c00; text-decoration: underline; }
  .cg-freshness { font-size: 11px; color: #666; margin-top: 2px; min-height: 14px; }
  .cg-freshness .cg-stale { color: #b85c00; }
  .cg-freshness .cg-refresh { color: #b85c00; text-decoration: underline; }

  .cg-strip { display: flex; gap: 2px; margin-top: 8px; height: 28px; }
  .cg-cell {
    flex: 1; border-radius: 2px;
    border-bottom: 2px solid transparent;
    min-width: 0;
  }
  .cg-cell.weekend { border-bottom-color: rgba(0,0,0,0.18); }
  .cg-cell.cg-cell-available { background: #2e7d32; }
  .cg-cell.cg-cell-partial { background: #e0a800; }
  .cg-cell.cg-cell-booked { background: #9e9e9e; }
  .cg-cell.cg-cell-closed {
    background: repeating-linear-gradient(45deg, #ccc 0 2px, transparent 2px 4px);
    background-color: #ddd;
  }
  .cg-cell.skeleton {
    background: linear-gradient(90deg, #eee 0%, #ddd 50%, #eee 100%);
    background-size: 200% 100%;
    animation: cg-shimmer 1.4s ease-in-out infinite;
  }
  @keyframes cg-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .cg-day-labels {
    display: flex; justify-content: space-between;
    margin-top: 4px;
    font-size: 10px; color: #999;
  }

  .cg-closed-banner {
    margin-top: 12px; padding: 24px 12px;
    background: #f5f5f5; border-radius: 8px;
    text-align: center; color: #666; font-size: 13px;
  }

  .cg-actions { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
  .cg-btn {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 15px; font-weight: 600;
    text-align: center; text-decoration: none;
    cursor: pointer;
    min-height: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .cg-btn-primary { background: #1b5e20; color: #fff; border: 0; }
  .cg-btn-primary:active { background: #154d18; }
  .cg-btn-secondary { background: #fff; color: #222; border: 1px solid #ccc; }
  .cg-btn-secondary:active { background: #f0f0f0; }

  .cg-details {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid #eee;
  }
  .cg-details summary {
    font-size: 14px; font-weight: 600; color: #444;
    cursor: pointer; outline: none;
    list-style: none;
  }
  .cg-details summary::-webkit-details-marker { display: none; }
  .cg-details summary::after { content: ' ▾'; color: #999; font-weight: 400; }
  .cg-details[open] summary::after { content: ' ▴'; }
  .cg-details > .pills, .cg-details > .cell, .cg-details > .rating { margin-top: 8px; }
  .cg-sites { margin-top: 8px; font-size: 12px; color: #555; }
</style>
</head>
<body>
<div id="map"></div>
<button id="panel-toggle" aria-label="Toggle layers panel">☰</button>
<div id="panel">
  <h1>Roadtrip Map</h1>
  <div id="search-wrap">
    <input type="search" id="search" placeholder="Search parks, chargers, gyms…" autocomplete="off">
    <div id="search-results"></div>
    <div id="sort-nearest-row" class="disabled">
      <input type="checkbox" id="sort-nearest" disabled>
      <label for="sort-nearest">Sort by nearest (location off)</label>
    </div>
  </div>
  <div class="section-label">Superchargers</div>
  <div><label><input type="checkbox" id="f-open" checked><span class="legend-dot" style="background:#e82127"></span>Open <span class="count" id="c-open"></span></label></div>
  <div><label><input type="checkbox" id="f-construction" checked><span class="legend-dot" style="background:#f5a623"></span>Construction <span class="count" id="c-construction"></span></label></div>
  <div><label><input type="checkbox" id="f-permit" checked><span class="legend-dot" style="background:#f7d56e"></span>Permit <span class="count" id="c-permit"></span></label></div>
  <div><label><input type="checkbox" id="f-plan"><span class="legend-dot" style="background:#bfbfbf"></span>Planned <span class="count" id="c-plan"></span></label></div>
  <div><label><input type="checkbox" id="f-closed"><span class="legend-dot" style="background:#333"></span>Closed <span class="count" id="c-closed"></span></label></div>
  <div class="status" id="status">Loading…</div>
  <div class="section-label">Parks</div>
  <div><label><input type="checkbox" id="f-np" checked><span class="legend-dot" style="background:#2e7d32; border-color:#1b5e20;"></span>National Parks <span class="count" id="c-np"></span></label></div>
  <div><label><input type="checkbox" id="f-sp"><span class="legend-dot" style="background:#8d6e63; border-color:#5d4037;"></span>State Parks <span class="count" id="c-sp"></span></label></div>
  <div class="section-label">Campgrounds <span id="cg-load-hint" style="text-transform:none; color:#999; letter-spacing:0;">(zoom in to load)</span></div>
  <div><label><input type="checkbox" id="f-cg-federal" checked><span class="legend-dot" style="background:#2e7d32"></span>Federal (US) <span class="count" id="c-cg-federal"></span></label></div>
  <div><label><input type="checkbox" id="f-cg-state"><span class="legend-dot" style="background:#558b2f"></span>State <span class="count" id="c-cg-state"></span></label></div>
  <div><label><input type="checkbox" id="f-cg-provincial" checked><span class="legend-dot" style="background:#2e7d32; border-color:#1b5e20;"></span>BC/AB Provincial <span class="count" id="c-cg-provincial"></span></label></div>
  <div><label><input type="checkbox" id="f-cg-local"><span class="legend-dot" style="background:#9ccc65"></span>Local <span class="count" id="c-cg-local"></span></label></div>
  <div class="section-label">Other</div>
  <div><label><input type="checkbox" id="f-pf" checked><span class="legend-dot" style="background:#7b4bb5"></span>Planet Fitness <span class="count" id="c-pf"></span></label></div>
  <div class="section-label">Basemap</div>
  <select id="basemap-select" style="width:100%; padding:4px 6px; border:1px solid #ccc; border-radius:4px; font-family:inherit; font-size:12px; background:#fff; margin-bottom:6px;"></select>
  <div><label><input type="checkbox" id="f-satellite">Satellite overlay</label></div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script type="module" src="/web/app.js"></script>
</body>
</html>
